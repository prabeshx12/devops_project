- name: Deploy InventoryOps container on Azure VM
  hosts: inventoryops
  vars:
    app_name: inventoryops
    app_port: 8000
    data_dir: /opt/inventoryops/data
    acr_login_server: "{{ lookup('env', 'ACR_LOGIN_SERVER') }}"
    acr_repository: "{{ lookup('env', 'ACR_REPOSITORY') | default('inventoryops', true) }}"
    acr_username: "{{ lookup('env', 'ACR_USERNAME') }}"
    acr_password: "{{ lookup('env', 'ACR_PASSWORD') }}"
    image_tag: "{{ lookup('env', 'IMAGE_TAG') | default('latest', true) }}"
    image_name: "{{ acr_login_server }}/{{ acr_repository }}:{{ image_tag }}"

  tasks:
    - name: Login to Azure Container Registry
      ansible.builtin.command: >
        docker login {{ acr_login_server }}
        --username {{ acr_username }}
        --password {{ acr_password }}
      changed_when: false
      no_log: true

    - name: Pull latest InventoryOps image
      ansible.builtin.command: docker pull {{ image_name }}

    - name: Stop existing container
      ansible.builtin.command: docker stop {{ app_name }}
      register: stop_result
      failed_when: false
      changed_when: stop_result.rc == 0

    - name: Remove existing container
      ansible.builtin.command: docker rm {{ app_name }}
      register: rm_result
      failed_when: false
      changed_when: rm_result.rc == 0

    - name: Stop local Compose app container if it is using the app port
      ansible.builtin.command: docker stop inventoryops-app
      register: stop_compose_result
      failed_when: false
      changed_when: stop_compose_result.rc == 0

    - name: Remove local Compose app container if it exists
      ansible.builtin.command: docker rm inventoryops-app
      register: rm_compose_result
      failed_when: false
      changed_when: rm_compose_result.rc == 0

    - name: Run new InventoryOps container
      ansible.builtin.command: >
        docker run -d
        --name {{ app_name }}
        --restart unless-stopped
        -p {{ app_port }}:8000
        -e DATA_DIR=/app/data
        -e LOG_LEVEL=INFO
        -v {{ data_dir }}:/app/data
        {{ image_name }}

    - name: Verify health endpoint inside the app container
      ansible.builtin.command: >
        docker exec {{ app_name }}
        python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      register: health_result
      retries: 10
      delay: 3
      until: health_result.rc == 0
