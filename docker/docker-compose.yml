services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: inventoryops:local
    container_name: inventoryops-app
    env_file:
      - ../.env
    environment:
      DATA_DIR: /app/data
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: inventoryops-prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: inventoryops-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-storage:
