global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "inventoryops-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: "jenkins"
    metrics_path: "/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8080"]
